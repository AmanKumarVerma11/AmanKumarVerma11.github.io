name: Daily Activity

on:
  schedule:
    # 12:00 AM IST = 18:30 UTC
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update activity log
        run: |
          mkdir -p .github/daily
          echo "active: $(date -u +%Y-%m-%dT%H:%M:%SZ)" > .github/daily/latest.txt

      - name: Commit and push
        run: |
          git config user.email "akverma11aug2002@gmail.com"
          git config user.name "aman"
          git add .github/daily/latest.txt
          git diff --staged --quiet || git commit -m "chore: daily activity [skip ci]"
          git push
